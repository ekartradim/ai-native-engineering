<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-Native Engineering - Bull</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="slide-base.css">
<style>
  body {
    font-family: var(--font-body);
    background: var(--infinity);
    color: var(--color-text-on-dark);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  .top-stripe {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: var(--bull-orange);
    z-index: 10;
  }
  /* Tree monogram bg */
  .tree-bg {
    position: absolute;
    bottom: -30px;
    right: 20px;
    width: 280px;
    height: 280px;
    opacity: 0.06;
    pointer-events: none;
    z-index: 1;
  }
  .slide {
    display: flex;
    width: 1280px;
    height: 720px;
    position: relative;
    z-index: 2;
    background: var(--dream-in-blue);
    overflow: hidden;
  }
  /* LEFT PANEL */
  .left {
    width: 430px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 38px 40px 36px 48px;
  }
  .logo-area .ds-logo {
    width: 200px;
    height: auto;
    display: block;
  }
  .claim-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 16px 0;
  }
  .eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--bull-orange);
    margin-bottom: 18px;
  }
  .headline {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 40px;
    line-height: 1.08;
    color: var(--color-text-on-dark);
    margin-bottom: 22px;
  }
  .headline em {
    font-style: normal;
    color: var(--bull-orange);
  }
  .subline {
    font-size: 14.5px;
    font-weight: 300;
    color: rgba(255,255,255,0.6);
    line-height: 1.6;
    max-width: 340px;
  }
  .footer-area {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .footer-label {
    font-size: 10px;
    font-weight: 400;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .footer-tagline {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.45);
  }
  .footer-tagline strong {
    color: var(--bull-orange);
    font-weight: 700;
  }
  /* RIGHT PANEL */
  .right {
    flex: 1;
    position: relative;
    display: flex;
    align-items: stretch;
    padding: 22px 24px 22px 0px;
  }
  .right::before {
    content: '';
    position: absolute;
    left: 0; top: 8%; bottom: 8%;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(255,85,57,0.25) 30%, rgba(255,85,57,0.25) 70%, transparent);
  }
  .image-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 20px 70px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06);
  }
  .image-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }
</style>
</head>
