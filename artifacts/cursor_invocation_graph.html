<text class="ts" x="375" y="519" text-anchor="middle" fill="#c8c2b4">Subagents are full agent instances — they can invoke commands, pull skills, and spawn further subagents.</text>
<text class="ts" x="375" y="537" text-anchor="middle" fill="#c8c2b4">Recursive subagent spawning requires a paid API model (Composer/auto cannot spawn subagents).</text>
